site_name: "Machine Learning 102"
site_description: Intermediate Azure Machine Learning training.
site_url: https://cloud2br-tec.github.io/ai-academy-102-ml/
docs_dir: docs/i18n
copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: "Español"
          build: true
          nav_translations:
            Home: Inicio
            01. Math Prerequisites: "01. Prerrequisitos Matemáticos"
            02. End-to-End ML Overview: "02. Visión General de Extremo a Extremo"
            03. Introduction and Lifecycle: "03. Introducción y Ciclo de Vida"
            04. ML Foundations: "04. Fundamentos de ML"
            05. Neural Networks and Deep Learning: "05. Redes Neuronales y Deep Learning"
            06. Azure ML Environment: "06. Entorno de Azure ML"
            07. Environment Setup: "07. Configuración del Entorno"
            08. Data Preparation: "08. Preparación de Datos"
            09. Model Types: "09. Tipos de Modelos"
            10. Training and AutoML: "10. Entrenamiento y AutoML"
            11. Performance Metrics: "11. Métricas de Rendimiento"
            12. Results and Explainability: "12. Resultados y Explicabilidad"
            13. Deployment: "13. Despliegue"
            14. Deployment Debugging: "14. Depuración de Despliegue"
            Reference: Referencia
            Overview: "Visión General"
            Mathematical Model Deep Dive: "Análisis Matemático Profundo de Modelos"
            CLI Commands: "Comandos CLI"
            Glossary: Glosario

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Math Prerequisites: modules/01-math-prerequisites.md
  - 02. End-to-End ML Overview: modules/02-e2e-overview.md
  - 03. Introduction and Lifecycle: modules/03-introduction.md
  - 04. ML Foundations: modules/04-ml-foundations.md
  - 05. Neural Networks and Deep Learning: modules/05-neural-networks.md
  - 06. Azure ML Environment: modules/06-azure-ml-environment.md
  - 07. Environment Setup: modules/07-environment-setup.md
  - 08. Data Preparation: modules/08-data-preparation.md
  - 09. Model Types: modules/09-model-types.md
  - 10. Training and AutoML: modules/10-training-automl.md
  - 11. Performance Metrics: modules/11-performance-metrics.md
  - 12. Results and Explainability: modules/12-results-explainability.md
  - 13. Deployment: modules/13-deployment.md
  - 14. Deployment Debugging: modules/14-deployment-debug-k8s.md
  - Reference:
      - Overview: reference/index.md
      - Mathematical Model Deep Dive: reference/model-math-deep-dive.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
